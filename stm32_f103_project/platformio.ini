; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = uart_led

[env]
platform = ststm32
board = genericSTM32F103RB
framework = stm32cube
upload_protocol = stlink
debug_tool = stlink
monitor_speed = 115200
monitor_port = /dev/tty.usbserial-0001
build_flags =
  -DDEBUG

[env:uart_led]
build_src_filter = +<tests/uart_led/*.c>

[env:i2c_scan]
build_src_filter = +<tests/i2c/*.c>

[env:grove_lcd]
build_src_filter = +<tests/grove_lcd/*.c>

[env:grove_lcd_sensor]
build_src_filter = +<tests/grove_lcd_sensor/*.c>
